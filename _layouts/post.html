---
layout: default
---
<article class="post">
  <header class="post-header">
    <p class="dim">// {{ page.date | date: "%Y-%m-%d" }}</p>
    <h1>{{ page.title }}</h1>
    <div class="rule-double" role="presentation"></div>
  </header>

  {{ content }}

  <div class="rule" role="presentation"></div>
  <p><a href="{{ '/blog/' | relative_url }}">[ &lt;- back to all posts ]</a></p>
</article>
